# ===========================================================
# SBS Green Seeds — configuração de publicação (Netlify)
# Site estático. URLs amigáveis para os três sistemas.
# ===========================================================

[build]
  publish = "."

[functions]
  directory = "functions"
  node_bundler = "esbuild"

# raiz sempre abre o hub (index)
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
  force = true

# URLs amigáveis (atalhos) → arquivos reais
[[redirects]]
  from = "/vendedor"
  to = "/SBS Portal do Vendedor.html"
  status = 200

[[redirects]]
  from = "/painel"
  to = "/SBS Painel Gerencial.html"
  status = 200

[[redirects]]
  from = "/ti"
  to = "/SBS Painel T.I.html"
  status = 200

[[redirects]]
  from = "/ceo"
  to = "/SBS Painel CEO.html"
  status = 200

[[redirects]]
  from = "/atendimento"
  to = "/SBS Painel Atendimento.html"
  status = 200

[[redirects]]
  from = "/marketing"
  to = "/SBS Painel Marketing.html"
  status = 200

[[redirects]]
  from = "/pd"
  to = "/SBS Painel PD.html"
  status = 200

[[redirects]]
  from = "/rh"
  to = "/SBS Painel RH.html"
  status = 200

[[redirects]]
  from = "/colaborador"
  to = "/SBS Portal do Colaborador.html"
  status = 200

[[redirects]]
  from = "/mercado"
  to = "/SBS Painel Inteligencia Mercado.html"
  status = 200

# cabeçalhos de segurança básicos
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
