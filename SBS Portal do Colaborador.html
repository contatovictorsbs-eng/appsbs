<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>SBS Green Seeds · Portal do Colaborador</title>
<meta name="theme-color" content="#0B6B61">
<meta name="sbs-platform" content="colaborador">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<template id="__bundler_thumbnail" data-bg-color="#0B6B61">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0B6B61"/>
    <circle cx="600" cy="330" r="80" fill="#6FA331"/>
    <path d="M455 540 a145 130 0 0 1 290 0 z" fill="#6FA331"/>
  </svg>
</template>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--brand:#0B6B61;--brand2:#174D2F;--accent:#6FA331;--ink:#16201a;--ink2:#3a463f;--muted:#6b7a74;--line:#e6ebe9;--bg:#f3f6f4;--card:#fff}
  body{font-family:"Plus Jakarta Sans",system-ui,sans-serif;background:#dfe6e2;color:var(--ink)}
  .hidden{display:none!important}
  button,input{font-family:inherit}
  /* phone frame */
  .device{max-width:440px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;display:flex;flex-direction:column;box-shadow:0 0 50px rgba(0,0,0,.12)}
  /* login */
  .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:26px;background:radial-gradient(130% 100% at 50% 0%,#0E8377 0%,#0B6B61 55%,#08574f 100%)}
  .login-card{width:100%;max-width:380px;background:#fff;border-radius:22px;padding:30px 26px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
  .login-logo{width:54px;height:54px;border-radius:15px;background:linear-gradient(150deg,#0E9B8E,#174D2F);display:grid;place-items:center;margin-bottom:18px}
  .login-card h1{font-size:21px;font-weight:800}
  .login-card .sub{font-size:13px;color:var(--muted);margin:4px 0 22px}
  .login-card label{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:6px}
  .login-card input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;font-size:14px;outline:none;margin-bottom:14px}
  .login-card input:focus{border-color:var(--brand)}
  .login-card .err{min-height:16px;font-size:12px;font-weight:700;color:#c0392b;margin-bottom:6px;display:none}
  .login-card .err.show{display:block}
  .login-card .enter{width:100%;border:0;background:var(--brand);color:#fff;font-size:15px;font-weight:800;padding:14px;border-radius:12px;cursor:pointer}
  .login-foot{text-align:center;font-size:11.5px;color:var(--muted);margin-top:16px;display:flex;align-items:center;justify-content:center;gap:6px}
  .login-foot i{width:14px;height:14px}
  /* appbar */
  .appbar{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);height:54px;display:flex;align-items:center;padding:0 18px;font-size:17px;font-weight:800}
  .co-bell{margin-left:auto;position:relative;border:0;background:none;cursor:pointer;color:var(--ink2);padding:6px}
  .co-bell i{width:22px;height:22px}
  .co-bell-n{position:absolute;top:0;right:0;min-width:16px;height:16px;background:#E1306C;color:#fff;font-size:9px;font-weight:800;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 4px;border:1.5px solid #fff}
  .co-bell-n.show{display:flex}
  .co-notif{display:flex;gap:12px;padding:14px;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;background:var(--card)}
  .co-notif.unread{background:#F3F9F7;border-color:#bfe0d6}
  .co-notif-ic{width:40px;height:40px;border-radius:11px;background:#E9F3EF;color:#0B6B61;display:grid;place-items:center;flex:0 0 auto}
  .co-notif-ic i{width:19px;height:19px}
  .co-notif-b{flex:1;min-width:0}
  .co-notif-t{font-size:14px;font-weight:700;color:var(--ink)}
  .co-notif-x{font-size:12.5px;color:var(--ink2);margin-top:3px;line-height:1.45}
  .co-notif-d{font-size:11px;color:var(--muted);margin-top:5px}
  /* screen */
  .screen{flex:1;overflow-y:auto;padding:0 16px 90px}
  .co-hero{background:linear-gradient(150deg,#0B6B61,#10B0A0);margin:0 -16px 16px;padding:26px 20px 22px;color:#fff}
  .co-greet{font-size:22px;font-weight:800}
  .co-sub{font-size:13px;opacity:.92;margin-top:3px}
  .co-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:12px}
  .co-pin{border-color:#ECD9A6;background:#FBF8EE;cursor:pointer}
  .co-pin-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;color:#C0710F;text-transform:uppercase;letter-spacing:.03em}
  .co-pin-tag i{width:13px;height:13px}
  .co-pin-t{font-size:16px;font-weight:800;margin:6px 0 4px}
  .co-pin-x{font-size:13px;color:var(--muted);line-height:1.45}
  .co-quick{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:6px}
  .co-q{display:flex;flex-direction:column;align-items:center;gap:7px;background:none;border:0;cursor:pointer;font-size:11.5px;font-weight:700;color:var(--ink2)}
  .co-q-ic{width:50px;height:50px;border-radius:15px;display:grid;place-items:center}
  .co-q-ic i{width:22px;height:22px}
  .co-sec{font-size:13px;font-weight:800;color:var(--ink);margin:18px 2px 10px}
  .co-aniv-row{display:flex;gap:14px;overflow-x:auto;padding:2px 0 6px}
  .co-aniv{display:flex;flex-direction:column;align-items:center;gap:5px;flex:0 0 auto;width:60px}
  .co-av{width:46px;height:46px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:14px;font-weight:800;background-size:cover;background-position:center}
  .co-av.has-photo{color:transparent}
  .co-av.lg{width:50px;height:50px}
  .co-av.xl{width:78px;height:78px;font-size:24px}
  .co-aniv-n{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px}
  .co-aniv-d{font-size:11px;color:var(--muted)}
  .co-ev{display:flex;align-items:center;gap:13px}
  .co-ev-date{width:46px;height:46px;border-radius:13px;background:#E9F3EF;color:var(--brand);display:flex;flex-direction:column;align-items:center;justify-content:center;flex:0 0 auto}
  .co-ev-date b{font-size:16px;font-weight:800;line-height:1}
  .co-ev-date span{font-size:10px;text-transform:uppercase}
  .co-ev-b{flex:1;min-width:0}
  .co-ev-t{font-size:14px;font-weight:700}
  .co-ev-s{font-size:12px;color:var(--muted);margin-top:1px}
  .co-badge{font-size:10.5px;font-weight:800;padding:4px 9px;border-radius:20px;white-space:nowrap}
  .co-com.hot{background:#FBF8EE;border-color:#ECD9A6}
  .co-com-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
  .co-com-cat{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--brand);background:#E9F3EF;padding:3px 9px;border-radius:20px}
  .co-com-date{font-size:11px;color:var(--muted)}
  .co-com-t{font-size:15px;font-weight:800;display:flex;align-items:center;gap:5px}
  .co-pinicon{width:14px;height:14px;color:#C0710F}
  .co-com-x{font-size:13px;color:var(--ink2);line-height:1.5;margin-top:5px}
  .co-com-by{font-size:11.5px;color:var(--muted);margin-top:8px;font-style:italic}
  .co-vagas-intro{display:flex;align-items:center;gap:8px;background:#E9F3EF;color:#0B6B61;border-radius:13px;padding:12px 14px;font-size:12.5px;font-weight:600;margin:14px 0}
  .co-vagas-intro i{width:16px;height:16px;flex:0 0 auto}
  .co-vaga-t{font-size:16px;font-weight:800}
  .co-vaga-m{display:flex;flex-wrap:wrap;gap:12px;margin:8px 0}
  .co-vaga-m span{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
  .co-vaga-m i{width:13px;height:13px}
  .co-vaga-d{font-size:13px;color:var(--ink2);line-height:1.45;margin-bottom:12px}
  .co-btn{width:100%;border:0;background:var(--brand);color:#fff;font-size:13.5px;font-weight:700;padding:11px;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
  .co-btn i{width:15px;height:15px}
  .co-btn.ghost{background:#fff;border:1.5px solid var(--line);color:#b3261e;margin-top:16px}
  .co-anivrow{display:flex;align-items:center;gap:13px}
  .co-anivrow-b{flex:1;min-width:0}
  .co-anivrow-n{font-size:14.5px;font-weight:700}
  .co-anivrow-s{font-size:12px;color:var(--muted)}
  .co-anivrow-d{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;color:#8C2740}
  .co-anivrow-d i{width:15px;height:15px}
  .co-profile{display:flex;flex-direction:column;align-items:center;gap:8px;padding:22px 0 18px}
  .co-profile-n{font-size:19px;font-weight:800}
  .co-profile-c{font-size:13px;color:var(--muted)}
  .co-kv{display:flex;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px solid var(--line)}
  .co-kv:last-child{border-bottom:0}
  .co-k{font-size:12.5px;color:var(--muted);font-weight:700}
  .co-v{font-size:13.5px;font-weight:600;text-align:right}
  .co-empty{display:flex;flex-direction:column;align-items:center;gap:12px;padding:60px 24px;text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5}
  .co-empty i{width:38px;height:38px;color:#b6c0bb}
  /* feed / rede social */
  .co-composer{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;margin:14px 0 12px}
  .co-comp-top{display:flex;gap:10px;align-items:flex-start}
  .co-comp-top textarea{flex:1;border:0;outline:0;resize:none;font-family:inherit;font-size:14px;min-height:44px;padding-top:6px;background:transparent}
  .co-comp-prev:not(:empty){margin:10px 0 4px}
  .co-prevwrap{position:relative;display:inline-block}
  .co-prevwrap img{max-width:100%;border-radius:12px;max-height:240px;display:block}
  .co-prevwrap button{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;border:0;background:rgba(0,0,0,.6);color:#fff;font-size:16px;cursor:pointer;line-height:1}
  .co-comp-acts{display:flex;align-items:center;justify-content:space-between;margin-top:10px;border-top:1px solid var(--line);padding-top:11px}
  .co-comp-add{display:flex;gap:16px}
  .co-comp-photo{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--brand);cursor:pointer}
  .co-comp-photo i{width:18px;height:18px}
  .co-comp-send{width:auto;padding:10px 18px}
  .co-post-h{display:flex;align-items:center;gap:11px}
  .co-post-meta{flex:1;min-width:0}
  .co-post-n{font-size:14px;font-weight:800}
  .co-oficial{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:800;color:#0B6B61;background:#E9F3EF;padding:2px 6px;border-radius:10px;vertical-align:middle}
  .co-oficial i{width:11px;height:11px}
  .co-post-of{border-color:#bfe0d6;box-shadow:0 0 0 2px #e9f3ef inset}
  .co-post-t{font-size:11.5px;color:var(--muted)}
  .co-post-del{border:0;background:none;color:var(--muted);cursor:pointer;padding:4px}
  .co-post-del i{width:16px;height:16px}
  .co-post-x{font-size:14px;line-height:1.5;margin:11px 0;color:var(--ink2)}
  .co-post-img{margin:0 -15px;background:#000}
  .co-post-img img{width:100%;display:block;max-height:420px;object-fit:cover}
  .co-post-stats{font-size:12px;color:var(--muted);margin-top:11px}
  .co-post-acts{display:flex;gap:6px;margin-top:8px;border-top:1px solid var(--line);padding-top:6px}
  .co-pa{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;border:0;background:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;color:var(--muted);padding:9px;border-radius:9px}
  .co-pa:active{background:#f3f6f4}
  .co-pa i{width:17px;height:17px}
  .co-pa.on{color:#E1306C}
  .co-pa.on i{fill:#E1306C}
  .co-comments{margin-top:8px;display:flex;flex-direction:column;gap:9px}
  .co-comments.hide{display:none}
  .co-cmt{display:flex;gap:8px;align-items:flex-start}
  .co-cmt-b{flex:1;background:#f1f4f2;border-radius:13px;padding:8px 12px;font-size:13px;line-height:1.4}
  .co-cmt-b b{font-weight:800}
  .co-av.xs{width:30px;height:30px;font-size:10px;flex:0 0 auto}
  .co-av.sm{width:38px;height:38px;font-size:13px;flex:0 0 auto}
  .co-cmt-box{display:flex;gap:8px;margin-top:10px;align-items:center}
  .co-cmt-box.hide{display:none}
  .co-cmt-box input{flex:1;border:1.5px solid var(--line);border-radius:20px;padding:9px 14px;font-size:13px;outline:none}
  .co-cmt-box input:focus{border-color:var(--brand)}
  .co-cmt-box button{width:38px;height:38px;border-radius:50%;border:0;background:var(--brand);color:#fff;cursor:pointer;flex:0 0 auto;display:grid;place-items:center}
  .co-cmt-box button i{width:16px;height:16px}
  /* bottom nav */
  .co-nav{position:sticky;bottom:0;background:var(--card);border-top:1px solid var(--line);display:flex;padding:7px 2px 9px}
  .co-tab{flex:1;background:none;border:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:700;padding:4px 0}
  .co-tab i{width:20px;height:20px}
  .co-tab.on{color:var(--brand)}
  .toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(20px);background:#16201a;color:#fff;border-radius:11px;padding:11px 18px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:.2s;z-index:99;box-shadow:0 12px 30px rgba(0,0,0,.3);max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="device">

  <!-- LOGIN -->
  <div class="login" id="login">
    <div class="login-card">
      <div class="login-logo"><svg width="26" height="26" viewBox="0 0 24 24"><ellipse cx="12" cy="11" rx="6.2" ry="9.2" transform="rotate(-18 12 12)" fill="#fff"></ellipse></svg></div>
      <h1>Portal do Colaborador</h1>
      <div class="sub">SBS Green Seeds · espaço do time</div>
      <form id="login-form" novalidate>
        <label>Usuário</label>
        <input id="lg-email" type="text" autocapitalize="none" spellcheck="false" placeholder="primeiro nome">
        <label>Senha</label>
        <input id="lg-pass" type="password" placeholder="Sua senha">
        <div class="err" id="lg-err"></div>
        <button class="enter" type="submit">Entrar</button>
      </form>
      <div class="login-foot"><i data-lucide="users"></i> Acesso para colaboradores SBS</div>
    </div>
  </div>

  <!-- APP -->
  <div class="app hidden" id="app">
    <div class="appbar" id="appbar"><span id="appbar-title">SBS</span>
      <button class="co-bell" id="co-bell"><i data-lucide="bell"></i><span class="co-bell-n" id="co-bell-n"></span></button>
    </div>
    <main class="screen" id="screen"></main>
    <nav class="co-nav">
      <button class="co-tab on" data-tab="inicio"><i data-lucide="home"></i>Início</button>
      <button class="co-tab" data-tab="feed"><i data-lucide="newspaper"></i>Feed</button>
      <button class="co-tab" data-tab="mural"><i data-lucide="megaphone"></i>Mural</button>
      <button class="co-tab" data-tab="agenda"><i data-lucide="calendar-days"></i>Agenda</button>
      <button class="co-tab" data-tab="vagas"><i data-lucide="briefcase"></i>Vagas</button>
      <button class="co-tab" data-tab="eu"><i data-lucide="user"></i>Eu</button>
    </nav>
  </div>

  <div class="toast" id="toast"></div>
</div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="auth-users.js"></script>
  <script src="sbs-org.js"></script>
  <script src="data.js"></script>
  <script src="precos-data.js"></script>
  <script src="pedidos-data.js"></script>
  <script src="sbs-store.js"></script>
  <script src="sbs-plataformas.js"></script>
  <script src="sbs-config.js"></script>
  <script src="sbs-cloud.js"></script>
  <script src="sbs-avatar.js"></script>
  <script src="rh-data.js"></script>
  <script src="colaborador-app.js"></script>
  <script src="colaborador-boot.js"></script>
</body>
</html>
