<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="sbs-platform" content="ti">
<title>SBS Green Seeds · Painel de T.I.</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="panel.css?v=15">
<template id="__bundler_thumbnail" data-bg-color="#1B2A4A">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#1B2A4A"/>
    <rect x="380" y="330" width="180" height="92" rx="46" fill="#3CC7B8"/>
    <circle cx="520" cy="376" r="32" fill="#fff"/>
    <rect x="620" y="346" width="200" height="26" rx="13" fill="#5B7BB4"/>
    <rect x="620" y="392" width="140" height="26" rx="13" fill="#34507F"/>
  </svg>
</template>
<style>
  /* ===== Painel T.I. — identidade visual própria (azul tecnologia) ===== */
  .app{ --brand:#2A4A7F; --brand-2:#3CC7B8; }
  .sidebar{ background:#1B2A4A; }
  .sb-logo .lt small{ color:#9DB2D8; }
  .nav-item.active{ background:rgba(60,199,184,.16); color:#fff; }
  .nav-item.active i{ color:var(--brand-2); }
  .login-card .btn, .app .btn{ background:#2A4A7F; }

  .ti-kpis{ display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:16px; margin-bottom:22px; }
  .ti-kpi{ display:flex; gap:13px; align-items:center; background:var(--card,#fff); border:1px solid var(--line,#e6ebe9); border-radius:16px; padding:16px 18px; }
  .ti-kpi-ic{ width:42px; height:42px; border-radius:12px; display:grid; place-items:center; background:#eef2f9; color:#2A4A7F; flex:0 0 auto; }
  .ti-kpi-ic i{ width:21px; height:21px; }
  .ti-kpi.ok .ti-kpi-ic{ background:#e6f7f3; color:#0B8A78; }
  .ti-kpi.warn .ti-kpi-ic{ background:#fdeede; color:#b46b16; }
  .ti-kpi.info .ti-kpi-ic{ background:#e9f0fb; color:#2A4A7F; }
  .ti-kpi.brand .ti-kpi-ic{ background:#2A4A7F; color:#fff; }
  .ti-kpi-v{ font-size:24px; font-weight:800; color:var(--ink,#16201a); line-height:1.1; }
  .ti-kpi-l{ font-size:12px; color:var(--muted,#6b7a74); margin-top:2px; }

  .ti-cols{ display:grid; grid-template-columns:1.4fr 1fr; gap:18px; }
  .ti-panel{ background:var(--card,#fff); border:1px solid var(--line,#e6ebe9); border-radius:16px; padding:18px; }
  .ti-panel-h{ font-size:13px; font-weight:800; color:var(--ink,#16201a); display:flex; align-items:center; gap:8px; margin-bottom:14px; }
  .ti-panel-h i{ width:17px; height:17px; color:#2A4A7F; }
  .ti-row{ display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--line,#eef1f0); cursor:pointer; }
  .ti-row:last-child{ border-bottom:0; }
  .ti-row-main{ flex:1; min-width:0; }
  .ti-row-t{ font-size:13.5px; font-weight:700; color:var(--ink,#16201a); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ti-row-s{ font-size:11.5px; color:var(--muted,#6b7a74); margin-top:1px; }

  .ti-note{ font-size:12.5px; border-radius:12px; padding:11px 13px; margin-bottom:10px; line-height:1.45; }
  .ti-note.ok{ background:#e6f7f3; color:#0B6B5E; }
  .ti-note.warn{ background:#fdeede; color:#9a5a12; }
  .ti-note.info{ background:#eef2f9; color:#2A4A7F; display:flex; gap:8px; align-items:flex-start; }
  .ti-note.run{ background:#e9f0fb; color:#2A4A7F; }
  .ti-note i{ width:16px; height:16px; flex:0 0 auto; margin-top:1px; }
  .ti-quick{ display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }

  .ti-btn{ display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line,#dce3e0); background:var(--card,#fff); color:var(--ink,#16201a); border-radius:10px; padding:9px 14px; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; }
  .ti-btn i{ width:15px; height:15px; }
  .ti-btn:hover{ border-color:#c3cdc8; }
  .ti-btn.primary{ background:#2A4A7F; border-color:#2A4A7F; color:#fff; }
  .ti-btn.primary:hover{ background:#22406f; }
  .ti-btn.danger{ background:#fff; border-color:#e9c4c4; color:#b3261e; }

  .ti-toolbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
  .ti-sub{ font-size:12.5px; color:var(--muted,#6b7a74); font-weight:600; }

  /* features */
  .ti-group{ margin-bottom:18px; }
  .ti-group-h{ font-size:11.5px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:#2A4A7F; margin:0 2px 9px; }
  .ti-feat{ display:flex; align-items:center; gap:13px; background:var(--card,#fff); border:1px solid var(--line,#e6ebe9); border-radius:13px; padding:13px 16px; margin-bottom:9px; }
  .ti-feat.is-off{ background:#fafbfc; }
  .ti-feat.is-off .ti-feat-ic{ background:#f0f2f4; color:#9aa6a1; }
  .ti-feat-ic{ width:38px; height:38px; border-radius:10px; background:#eef2f9; color:#2A4A7F; display:grid; place-items:center; flex:0 0 auto; }
  .ti-feat-ic i{ width:18px; height:18px; }
  .ti-feat-main{ flex:1; min-width:0; }
  .ti-feat-t{ font-size:14px; font-weight:700; color:var(--ink,#16201a); }
  .ti-feat-s{ font-size:11.5px; color:var(--muted,#6b7a74); margin-top:2px; }

  .ti-switch{ position:relative; width:46px; height:26px; flex:0 0 auto; cursor:pointer; }
  .ti-switch input{ opacity:0; width:0; height:0; position:absolute; }
  .ti-slider{ position:absolute; inset:0; background:#cfd6dc; border-radius:20px; transition:.18s; }
  .ti-slider::before{ content:""; position:absolute; width:20px; height:20px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.18s; box-shadow:0 1px 3px rgba(0,0,0,.25); }
  .ti-switch input:checked + .ti-slider{ background:#1F9E8C; }
  .ti-switch input:checked + .ti-slider::before{ transform:translateX(20px); }
  .ti-lock{ width:38px; height:26px; display:grid; place-items:center; color:#9aa6a1; flex:0 0 auto; }
  .ti-lock i{ width:16px; height:16px; }

  /* gmud cards */
  .ti-cards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
  .ti-card{ background:var(--card,#fff); border:1px solid var(--line,#e6ebe9); border-radius:15px; padding:16px; cursor:pointer; transition:.15s; }
  .ti-card:hover{ border-color:#bcc9e0; box-shadow:0 6px 18px rgba(27,42,74,.08); transform:translateY(-1px); }
  .ti-card-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; }
  .ti-num{ font-size:12px; font-weight:800; color:#2A4A7F; letter-spacing:.03em; }
  .ti-card-t{ font-size:15px; font-weight:800; color:var(--ink,#16201a); line-height:1.3; margin-bottom:10px; }
  .ti-card-meta{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .ti-card-x{ display:flex; align-items:center; gap:7px; font-size:12px; color:var(--muted,#6b7a74); margin-top:5px; }
  .ti-card-x i{ width:14px; height:14px; flex:0 0 auto; }

  .ti-tag{ display:inline-block; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; background:#eef2f9; color:#2A4A7F; }
  .ti-tag.r-baixo{ background:#e6f7f3; color:#0B8A78; }
  .ti-tag.r-medio{ background:#fdeede; color:#b46b16; }
  .ti-tag.r-alto{ background:#fde8e6; color:#b3261e; }

  .ti-badge{ font-size:11px; font-weight:800; padding:4px 10px; border-radius:20px; white-space:nowrap; }
  .s-draft{ background:#eef1f0; color:#69756f; }
  .s-sched{ background:#e9f0fb; color:#2A4A7F; }
  .s-run{ background:#fdeede; color:#b46b16; }
  .s-done{ background:#e6f7f3; color:#0B8A78; }
  .s-cancel{ background:#fde8e6; color:#b3261e; }

  .ti-empty{ text-align:center; color:var(--muted,#6b7a74); font-size:13px; padding:18px; }
  .ti-empty.big{ display:flex; flex-direction:column; align-items:center; gap:12px; padding:54px 18px; }
  .ti-empty.big i{ width:38px; height:38px; color:#bcc9e0; }
  .er-stack{ margin-top:6px; }
  .er-stack summary{ cursor:pointer; font-size:12px; color:#2A4A7F; }
  .er-stack pre{ margin:6px 0 0; padding:8px 10px; background:#f3f5f9; border-radius:8px; font-size:11px; line-height:1.5; overflow:auto; max-height:160px; white-space:pre-wrap; word-break:break-word; }
  .mig-steps{ counter-reset:m; list-style:none; margin:12px 0 0; padding:0; }
  .mig-steps li{ position:relative; padding:6px 0 6px 34px; font-size:13px; color:#3a4754; line-height:1.5; }
  .mig-steps li::before{ counter-increment:m; content:counter(m); position:absolute; left:0; top:5px; width:22px; height:22px; background:#2A4A7F; color:#fff; border-radius:50%; display:grid; place-items:center; font-size:11.5px; font-weight:800; }
  .mig-steps code, .ti-panel code, .ti-note code{ background:#eef1f6; padding:1px 6px; border-radius:5px; font-family:ui-monospace,Menlo,monospace; font-size:12px; color:#2A4A7F; }

  /* form */
  .ti-form{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .ti-fld{ display:flex; flex-direction:column; gap:6px; }
  .ti-fld.full{ grid-column:1 / -1; }
  .ti-fld label{ font-size:12px; font-weight:700; color:var(--ink-2,#3a463f); }
  .ti-fld input, .ti-fld select, .ti-fld textarea{ font-family:inherit; font-size:14px; border:1.5px solid var(--line,#dce3e0); border-radius:10px; padding:10px 12px; color:var(--ink,#16201a); background:#fff; width:100%; }
  .ti-fld textarea{ min-height:74px; resize:vertical; }
  .ti-fld input:focus, .ti-fld select:focus, .ti-fld textarea:focus{ outline:none; border-color:#2A4A7F; }
  .ti-chks{ display:grid; grid-template-columns:1fr 1fr; gap:6px 14px; max-height:180px; overflow-y:auto; padding:4px 2px; }
  .ti-chk{ display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink,#16201a); cursor:pointer; }
  .ti-chk input{ width:16px; height:16px; accent-color:#2A4A7F; }

  /* side detail */
  .side-eyebrow{ font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:#2A4A7F; margin-bottom:4px; }
  .ti-kv{ margin-bottom:14px; }
  .ti-kv .k{ font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--muted,#8b968f); margin-bottom:4px; }
  .ti-kv .v{ font-size:14px; color:var(--ink,#16201a); line-height:1.5; }
  .ti-hist{ font-size:12px; color:var(--muted,#6b7a74); padding:3px 0; }

  .ti-steps{ display:flex; align-items:center; margin-bottom:20px; }
  .ti-step{ display:flex; flex-direction:column; align-items:center; gap:5px; font-size:10.5px; font-weight:700; color:#9aa6a1; flex:1; }
  .ti-step span{ width:26px; height:26px; border-radius:50%; background:#eef1f0; color:#9aa6a1; display:grid; place-items:center; font-size:12px; }
  .ti-step.on{ color:#0B8A78; }
  .ti-step.on span{ background:#1F9E8C; color:#fff; }
  .ti-step.cx span{ background:#fde8e6; color:#b3261e; }
  .ti-step-line{ height:2px; background:#e6ebe9; flex:1; margin:0 -4px; position:relative; top:-9px; }

  .ti-version{ background:#1B2A4A; color:#fff; border-radius:16px; padding:22px 24px; margin-bottom:22px; }
  .ti-version-v{ font-size:32px; font-weight:800; }
  .ti-version-l{ font-size:12.5px; color:#9DB2D8; margin-top:3px; }
  .ti-timeline{ position:relative; padding-left:8px; }
  .ti-tl{ display:flex; gap:14px; padding-bottom:18px; position:relative; }
  .ti-tl:not(:last-child)::before{ content:""; position:absolute; left:5px; top:14px; bottom:-4px; width:2px; background:#e1e7ec; }
  .ti-tl-dot{ width:12px; height:12px; border-radius:50%; background:#2A4A7F; border:2px solid #fff; box-shadow:0 0 0 2px #2A4A7F; flex:0 0 auto; margin-top:3px; z-index:1; }
  .ti-tl-top{ display:flex; align-items:center; gap:8px; margin-bottom:3px; }
  .ti-tl-v{ font-size:13px; font-weight:800; color:#2A4A7F; }
  .ti-tl-num{ font-size:11px; color:var(--muted,#8b968f); font-weight:700; }
  .ti-tl-t{ font-size:14.5px; font-weight:700; color:var(--ink,#16201a); }
  .ti-tl-d{ font-size:12.5px; color:var(--muted,#6b7a74); margin-top:3px; line-height:1.45; }
  .ti-tl-x{ font-size:11.5px; color:var(--muted,#8b968f); margin-top:5px; }

  @media (max-width:900px){ .ti-kpis{ grid-template-columns:1fr 1fr; } .ti-cols{ grid-template-columns:1fr; } .ti-form{ grid-template-columns:1fr; } }
  .ti-int{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line,#eef1f0)}
  .ti-int:last-child{border-bottom:0}
  /* demandas */
  .ti-table{display:flex;flex-direction:column}
  .ti-trow{display:grid;grid-template-columns:2fr 1.2fr 1fr 0.9fr 1fr;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line,#eef1f0);font-size:13px}
  .ti-trow:last-child{border-bottom:0}
  .ti-trow.head{font-size:11px;font-weight:800;color:var(--muted,#8b968f);text-transform:uppercase;letter-spacing:.04em}
  .ti-tmain{min-width:0}
  .ti-tt{font-weight:700;color:var(--ink,#16201a)}
  .ti-ts{font-size:11.5px;color:var(--muted,#8b968f)}
  .ti-pill{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .ti-kvs{display:flex;flex-direction:column;gap:12px;margin-bottom:8px}
  .ti-input{font-family:inherit;font-size:13px;color:var(--ink,#16201a);background:#fff;border:1.5px solid var(--line,#dce3e0);border-radius:9px;padding:9px 11px;outline:none}
  .ti-input:focus{border-color:#2A4A7F}
  .ti-block{margin-top:16px}
  .ti-block-h{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted,#8b968f);margin-bottom:8px}
  .ti-block-x{font-size:13.5px;color:var(--ink,#16201a);line-height:1.55;white-space:pre-line}
  .ti-hist{display:flex;gap:7px;align-items:flex-start;font-size:12px;color:var(--muted,#6b7a74);padding:4px 0}
  .ti-hist i{width:14px;height:14px;flex:0 0 auto;color:#2A4A7F}
  .ti-hist b{display:block;color:var(--ink,#16201a);font-weight:700;font-size:12.5px}
  .ti-hist span{font-size:11px}
  @media(max-width:760px){.ti-trow{grid-template-columns:1fr;gap:4px}.ti-trow.head{display:none}}
  /* automações */
  .au-list{display:flex;flex-direction:column;gap:14px;margin-bottom:16px}
  .au-card{background:var(--card,#fff);border:1px solid var(--line,#e6ebe9);border-radius:15px;padding:16px}
  .au-card.off{opacity:.62}
  .au-top{display:flex;align-items:flex-start;gap:13px}
  .au-ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:#eef2f9;color:#2A4A7F;flex:0 0 auto}
  .au-ic i{width:20px;height:20px}
  .au-main{flex:1;min-width:0}
  .au-nm{font-size:15px;font-weight:800;color:var(--ink,#16201a)}
  .au-desc{font-size:12.5px;color:var(--muted,#6b7a74);margin-top:2px;line-height:1.45}
  .au-sw{position:relative;display:inline-block;width:40px;height:23px;flex:0 0 auto;cursor:pointer}
  .au-sw input{opacity:0;width:0;height:0}
  .au-sw span{position:absolute;inset:0;background:#cdd5d1;border-radius:999px;transition:.2s}
  .au-sw span::before{content:"";position:absolute;width:17px;height:17px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .au-sw input:checked + span{background:#2A4A7F}
  .au-sw input:checked + span::before{transform:translateX(17px)}
  .au-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:13px;padding-top:13px;border-top:1px solid var(--line,#eef1f0)}
  .au-lim{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted,#6b7a74)}
  .au-lim label{font-weight:800;color:var(--ink,#16201a)}
  .au-lim input{border:1.5px solid var(--line,#dce3e0);border-radius:8px;padding:7px 9px;font-family:inherit;font-size:13px}
  .au-stat{display:flex;gap:8px;flex-wrap:wrap}
  .au-chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:#5B6470;background:#eef1f0;border-radius:999px;padding:4px 10px}
  .au-chip i{width:13px;height:13px}
  .au-chip.hot{background:#fdeede;color:#9a5a12}
  .au-log{margin-top:11px;border-top:1px dashed var(--line,#eef1f0);padding-top:9px;display:flex;flex-direction:column;gap:3px}
  .au-logrow{font-size:11.5px;color:var(--muted,#8b968f);display:flex;align-items:center;gap:3px}
  .au-logrow i{width:13px;height:13px}
  /* pesquisas */
  .pq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:16px}
  .pq-card{background:var(--card,#fff);border:1px solid var(--line,#e6ebe9);border-radius:15px;padding:16px;display:flex;flex-direction:column;gap:12px}
  .pq-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .pq-card-t{font-size:15.5px;font-weight:800;color:var(--ink,#16201a)}
  .pq-card-s{font-size:12.5px;color:var(--muted,#6b7a74);margin-top:3px;line-height:1.45}
  .pq-card-meta{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--muted,#6b7a74)}
  .pq-card-meta span{display:inline-flex;align-items:center;gap:5px}.pq-card-meta i{width:14px;height:14px}
  .pq-card-acts{display:flex;flex-wrap:wrap;gap:8px;margin-top:auto}
  .pq-back{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .pq-head-t{font-size:17px;font-weight:800;color:var(--ink,#16201a);display:flex;align-items:center;gap:10px}
  .pq-h3{margin:24px 0 12px;font-size:15px;font-weight:800;color:var(--ink,#16201a)}
  .pq-bar{display:grid;grid-template-columns:1fr 130px 42px;align-items:center;gap:10px;margin-bottom:9px}
  .pq-bar-l{font-size:12.5px;color:var(--ink,#16201a);font-weight:600}
  .pq-bar-tk{height:10px;background:#eef1f0;border-radius:6px;overflow:hidden}
  .pq-bar-tk span{display:block;height:100%;border-radius:6px}
  .pq-bar-v{font-size:13px;font-weight:800;text-align:right}
  .pq-quote{font-size:13px;color:var(--ink,#16201a);line-height:1.5;padding:7px 0;border-bottom:1px solid var(--line,#f0f3f1)}
  .pq-quote:last-child{border-bottom:0}
  .pq-resps{display:flex;flex-direction:column;gap:8px}
  .pq-resp{border:1px solid var(--line,#e6ebe9);border-radius:12px;overflow:hidden;background:var(--card,#fff)}
  .pq-resp summary{list-style:none;cursor:pointer;padding:12px 14px;display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--ink,#16201a)}
  .pq-resp summary::-webkit-details-marker{display:none}
  .pq-resp-n{font-size:11px;font-weight:800;color:#fff;background:#2A4A7F;border-radius:6px;padding:2px 7px;flex:0 0 auto}
  .pq-chev{width:15px;height:15px;margin-left:auto;color:var(--muted,#8b968f);transition:.2s}
  .pq-resp[open] .pq-chev{transform:rotate(180deg)}
  .pq-resp-body{padding:0 14px 14px;border-top:1px solid var(--line,#f0f3f1)}
  .pq-cells{display:flex;flex-wrap:wrap;gap:5px;margin:12px 0}
  .pq-cell{width:26px;height:26px;border-radius:6px;display:grid;place-items:center;font-size:12px;font-weight:800;flex:0 0 auto}
  .pq-abs{display:flex;flex-direction:column;gap:8px}
  .pq-ab{font-size:12.5px;line-height:1.45}.pq-ab b{display:block;color:var(--muted,#6b7a74);font-size:11px;font-weight:700;margin-bottom:2px}.pq-ab span{color:var(--ink,#16201a)}
  .pq-qrow{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .pq-qn{font-size:11px;font-weight:800;color:var(--muted,#8b968f);flex:0 0 auto;width:18px}
  .pq-qrow select.ti-input{flex:0 0 120px}.pq-qrow input[data-qg]{flex:0 0 150px}
  .pq-builder-foot{display:flex;justify-content:space-between;gap:10px;margin-top:18px;flex-wrap:wrap}
  .pq-meta-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .pq-grp-h{font-size:13px;font-weight:800;color:#2A4A7F;margin:18px 0 8px;padding-bottom:5px;border-bottom:2px solid #eef2f9}
  .pq-q{margin-bottom:14px}.pq-q-x{font-size:13.5px;color:var(--ink,#16201a);margin-bottom:7px;line-height:1.4}
  .pq-scale{display:flex;gap:8px}
  .pq-opt{cursor:pointer}.pq-opt input{display:none}
  .pq-opt span{display:grid;place-items:center;width:40px;height:38px;border:1.5px solid var(--line,#dce3e0);border-radius:9px;font-weight:800;color:var(--muted,#6b7a74)}
  .pq-opt input:checked + span{background:#2A4A7F;color:#fff;border-color:#2A4A7F}
  /* auditoria */
  .au-day{font-size:12px;font-weight:800;color:var(--muted,#8b968f);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 10px}
  .audit-tl{display:flex;flex-direction:column;gap:2px}
  .audit-row{display:flex;gap:12px;align-items:flex-start;padding:9px 10px;border-radius:10px}
  .audit-row:hover{background:#f6f8fb}
  .audit-ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto}.audit-ic i{width:16px;height:16px}
  .audit-main{min-width:0}
  .audit-t{font-size:13.5px;color:var(--ink,#16201a)}
  .audit-res{color:var(--muted,#6b7a74)}
  .audit-s{font-size:11.5px;color:var(--muted,#8b968f);margin-top:2px}
  .audit-ref{font-variant-numeric:tabular-nums}
  /* insights de melhoria da pesquisa */
  .pq-ins{background:var(--card,#fff);border:1px solid var(--line,#e6ebe9);border-radius:14px;padding:16px;margin-bottom:14px}
  .pq-ins-h{display:flex;align-items:center;gap:10px;font-size:15px;margin-bottom:12px}
  .pq-ins-b{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .pq-ins-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .pq-ins-l{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted,#8b968f);display:flex;align-items:center;gap:6px;margin-bottom:5px}
  .pq-ins-l i{width:14px;height:14px;color:#2A4A7F}
  .pq-ins-x{font-size:13px;color:var(--ink,#16201a);line-height:1.5}
  .pq-ins-act{margin-top:14px}
  /* saúde & segurança */
  .sd-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line,#eef1f0)}
  .sd-row:last-child{border-bottom:0}
  .sd-ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto;background:#eef2f9;color:#2A4A7F}
  .sd-ic.ok{background:#e6f7f3;color:#0B8A78}.sd-ic.warn{background:#fdeede;color:#b46b16}.sd-ic.erro{background:#fde8e6;color:#b3261e}
  .sd-ic i{width:19px;height:19px}
  .sd-main{flex:1;min-width:0}
  .sd-t{font-size:13.5px;font-weight:700;color:var(--ink,#16201a);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .sd-d{font-size:12px;color:var(--muted,#6b7a74);margin-top:2px;line-height:1.45}
  .sd-side{display:flex;align-items:center;gap:10px;flex:0 0 auto}
  .sd-extra{font-size:11.5px;color:var(--muted,#8b968f);font-weight:700;white-space:nowrap}
  .sd-chk{display:flex;align-items:flex-start;gap:11px;padding:10px 0;cursor:pointer;border-bottom:1px solid var(--line,#f0f3f1)}
  .sd-chk:last-of-type{border-bottom:0}
  .sd-chk input{display:none}
  .sd-chk-box{width:22px;height:22px;border-radius:7px;border:1.8px solid var(--line,#cdd5d1);display:grid;place-items:center;flex:0 0 auto;color:#fff;margin-top:1px;transition:.15s}
  .sd-chk-box i{width:14px;height:14px;opacity:0}
  .sd-chk input:checked + .sd-chk-box{background:#0B8A78;border-color:#0B8A78}
  .sd-chk input:checked + .sd-chk-box i{opacity:1}
  .sd-chk-t{font-size:13.5px;font-weight:700;color:var(--ink,#16201a);display:block}
  .sd-chk-d{font-size:12px;color:var(--muted,#6b7a74);margin-top:1px;display:block}
  .sd-facts{display:flex;flex-wrap:wrap;gap:16px;margin-top:14px;padding-top:12px;border-top:1px dashed var(--line,#eef1f0);font-size:12px;color:var(--muted,#6b7a74)}
  .sd-facts span{display:inline-flex;align-items:center;gap:6px}.sd-facts i{width:14px;height:14px}
  /* arquitetura */
  .ar-flow{display:flex;flex-direction:column;gap:0}
  .ar-layer{display:flex;gap:14px;align-items:flex-start;background:#fff;border:1px solid var(--line,#eef1f0);border-left:4px solid var(--c,#0B6B61);border-radius:14px;padding:15px 16px}
  .ar-ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;flex:0 0 auto;background:color-mix(in srgb,var(--c) 14%,#fff);color:var(--c)}
  .ar-ic i{width:21px;height:21px}
  .ar-t{font-size:14.5px;font-weight:800;color:var(--ink,#16201a)}
  .ar-d{font-size:12.7px;color:var(--muted,#6b7a74);line-height:1.55;margin-top:3px}
  .ar-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .ar-tag{font-size:11px;font-weight:700;color:var(--c,#0B6B61);background:color-mix(in srgb,var(--c) 10%,#fff);border-radius:99px;padding:3px 9px}
  .ar-arrow{display:grid;place-items:center;color:#b9c4be;padding:5px 0}.ar-arrow i{width:18px;height:18px}
  .ar-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  @media(max-width:760px){.ar-grid{grid-template-columns:1fr}}
  .ar-cc{display:flex;gap:11px;align-items:flex-start}
  .ar-cc-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto;background:#eef2f9;color:#2A4A7F}
  .ar-cc-ic i{width:17px;height:17px}
  .ar-cc-t{font-size:13.3px;font-weight:700;color:var(--ink,#16201a)}
  .ar-cc-d{font-size:12.2px;color:var(--muted,#6b7a74);line-height:1.5;margin-top:2px}
  .ar-steps{display:flex;flex-direction:column;gap:8px}
  .ar-step{font-size:13px;color:var(--ink-2,#3a4a44);padding:9px 12px;background:#f6f8f7;border-radius:10px}
  .ar-step b{color:#2A4A7F;margin-right:5px}
  @media(max-width:760px){.pq-ins-grid{grid-template-columns:1fr}}
  @media(max-width:760px){.pq-meta-grid{grid-template-columns:1fr 1fr}.pq-bar{grid-template-columns:1fr 90px 38px}.pq-qrow{flex-wrap:wrap}}
  .ti-hdot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;margin-top:4px}
  .ti-hdot.ok{background:#1F9E8C}.ti-hdot.warn{background:#E5A019}.ti-hdot.erro{background:#b3261e}
  .ti-int-t{font-size:13.5px;font-weight:700;color:var(--ink,#16201a)}
  .ti-int-d{font-size:12.5px;color:var(--muted,#6b7a74);margin-top:2px;line-height:1.45}
  .ti-launch{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .ti-lcard{background:var(--card,#fff);border:1px solid var(--line,#e6ebe9);border-radius:15px;padding:15px;border-top:3px solid var(--c)}
  .ti-lc-h{display:flex;align-items:center;gap:11px;margin-bottom:12px}
  .ti-lc-ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:#fff;flex:0 0 auto}
  .ti-lc-ic i{width:20px;height:20px}
  .ti-lc-t{flex:1;min-width:0}
  .ti-lc-n{font-size:14.5px;font-weight:800;color:var(--ink,#16201a)}
  .ti-lc-s{font-size:11.5px;font-weight:700}
  .ti-lc-s.on{color:#0B8A5E}.ti-lc-s.off{color:#C0710F}
  .ti-lc-go{width:34px;height:34px;border-radius:9px;background:#f3f5f4;display:grid;place-items:center;color:#2A4A7F;flex:0 0 auto}
  .ti-lc-go i{width:17px;height:17px}
  .ti-lc-go:hover{background:#e7eb ea;background:#e7ebea}
  .ti-lc-mods{display:flex;flex-wrap:wrap;gap:6px}
  .ti-lc-mod{font-size:11px;font-weight:600;color:#46554d;background:#eef2f0;padding:4px 9px;border-radius:20px}
  .ti-vis-mod{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#46554d;background:#eef2f0;padding:4px 9px;border-radius:20px;cursor:pointer}
  .ti-vis-mod input{width:13px;height:13px;accent-color:#0B8A5E;margin:0}
  .ti-vis-mod.off{color:#b3261e;background:#fdecea;text-decoration:line-through}
  .ti-search{border:1.5px solid var(--line,#dce3e0);border-radius:10px;padding:9px 14px;font-family:inherit;font-size:13px;width:280px;max-width:100%;outline:none}

</style>
